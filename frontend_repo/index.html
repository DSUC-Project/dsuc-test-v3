<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSUC Lab | DUT Superteam University Club Web3 Hub</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#020408', // Deep Navy Black
            surface: '#050A14',    // Slightly lighter dark
            cyber: {
              blue: '#2979FF',     // Electric Blue
              yellow: '#FFD600',   // Cyber Yellow
              dark: '#0A1220'
            },
            brutal: {
              bg: '#FAFAF9',
              black: '#111827',
              yellow: '#FDE047',
              blue: '#38BDF8',
              pink: '#F472B6',
              green: '#4ADE80',
              red: '#F87171'
            }
          },
          fontFamily: {
            sans: ['Open Sans', 'sans-serif'],
            display: ['Chakra Petch', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          backgroundImage: {
            'grid-pattern': "linear-gradient(to right, #2979FF10 1px, transparent 1px), linear-gradient(to bottom, #2979FF10 1px, transparent 1px)",
          },
          boxShadow: {
            'neo': '4px 4px 0px 0px #111827',
            'neo-sm': '2px 2px 0px 0px #111827',
            'neo-lg': '8px 8px 0px 0px #111827',
            'neo-xl': '12px 12px 0px 0px #111827',
            'neo-none': '0px 0px 0px 0px #111827',
            'brutal': '4px 4px 0px 0px #111827',
            'brutal-sm': '2px 2px 0px 0px #111827',
            'brutal-hover': '6px 6px 0px 0px #111827',
            'brutal-active': '1px 1px 0px 0px #111827',
          },
          animation: {
            'scan': 'scan 4s linear infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            scan: {
              '0%': { backgroundPosition: '0% 0%' },
              '100%': { backgroundPosition: '0% 100%' },
            },
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: var(--brutal-bg, #fafaf9);
      color: var(--brutal-black, #111827);
      overflow-x: hidden;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--brutal-bg, #fafaf9);
    }

    ::-webkit-scrollbar-thumb {
      background: #111827;
      border-radius: 0px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #38BDF8;
    }

    .glass-panel {
      background: rgba(5, 10, 20, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(41, 121, 255, 0.3);
      box-shadow: 0 0 15px rgba(41, 121, 255, 0.1);
    }

    .cyber-card {
      background: linear-gradient(180deg, rgba(41, 121, 255, 0.1) 0%, rgba(2, 4, 8, 0) 100%);
      border: 1px solid rgba(41, 121, 255, 0.3);
    }

    .cyber-clip-top {
      clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%, 0 20px);
    }

    .cyber-clip-bottom {
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
    }

    .cyber-button {
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .nav-shape {
      clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
